<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha EG | لخدمات الدعاية والإعلان الاحترافية</title>
    <!-- FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css للحركات الذكية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- جوجل فونت لخط عصري -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-light: #ffffff;
            --bg-subtle: #f8f9fa;
            --accent-glow: #00bcd4; /* لون أزرق فاتح جذاب */
            --text-main: #212529;
            --text-muted: #6c757d;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --header-gradient: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* خلفية متحركة ذكية - تم تغييرها لتكون فاتحة وناعمة */
        .background-glow {
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 188, 212, 0.05) 0%, transparent 70%);
            z-index: -1;
            animation: rotateGlow 30s linear infinite;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الهيدر الجديد مع الصورة والتمويجة */
        header {
            text-align: center;
            background-color: var(--bg-subtle);
            padding-top: 20px;
            position: relative;
        }

        .logo-image-container {
            max-width: 300px;
            margin: 0 auto 20px;
            padding: 10px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            animation: floatLogo 3s ease-in-out infinite;
        }

        .logo-image-container img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .logo-area h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .logo-area p {
            color: var(--accent-glow);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* التمويجة المتحركة تحت الهيدر */
        .wave-divider {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }

        .wave-divider svg {
            position: relative;
            display: block;
            width: calc(100% + 1.3px);
            height: 60px;
        }

        .wave-divider .shape-fill {
            fill: var(--bg-light);
        }

        /* القسم الرئيسي */
        .hero {
            padding: 80px 20px 40px;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 900;
            color: var(--text-main);
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            line-height: 1.8;
        }

        /* شبكة الخدمات الفخمة */
        .services-container {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--bg-subtle);
            border-radius: 40px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
            font-size: 2.5rem;
            position: relative;
            color: var(--text-main);
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: var(--header-gradient);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .service-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            border-color: var(--accent-glow);
        }

        .service-icon {
            font-size: 3.5rem;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            display: inline-block;
            transition: transform 0.4s;
        }

        .service-card:hover .service-icon {
            transform: scale(1.2) rotate(-5deg);
        }

        .service-card h3 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* أزرار التواصل الذكية */
        .cta-section {
            padding: 80px 20px;
            text-align: center;
            background: var(--bg-light);
        }

        .cta-section h2 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .cta-section p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 35px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            border: none;
            color: white;
        }

        .btn-tiktok { background-color: #000000; }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-whatsapp { background-color: #25D366; }
        .btn-call { background-color: var(--accent-glow); color: white;}

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* زرار سريع عائم للموبايل */
        .floating-contact {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .float-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.4s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 188, 212, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 188, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 188, 212, 0); }
        }

        .float-btn.wa { background-color: #25D366; }
        .float-btn.phone { background-color: var(--accent-glow); }

        .float-btn:hover { transform: scale(1.1) rotate(10deg); }

        footer {
            background-color: var(--bg-subtle);
            color: var(--text-muted);
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
            border-top: 1px solid rgba(0,0,0,0.05);
            margin-top: 40px;
        }

        /* تحسينات الموبايل */
        @media (max-width: 768px) {
            .logo-image-container { max-width: 200px; }
            .logo-area h1 { font-size: 2.2rem; }
            .logo-area p { letter-spacing: 3px; font-size: 1rem; }
            .hero h2 { font-size: 2rem; }
            .services-container { border-radius: 30px; padding: 40px 15px; }
            .section-title { font-size: 2rem; margin-bottom: 40px; }
            .services-grid { grid-template-columns: 1fr; gap: 20px; }
            .service-card { padding: 30px 20px; border-radius: 20px; }
            .btn { width: 100%; justify-content: center; margin-bottom: 10px;}
            .floating-contact { bottom: 20px; left: 20px; gap: 10px;}
            .float-btn { width: 55px; height: 55px; font-size: 1.5rem;}
        }
    </style>
</head>
